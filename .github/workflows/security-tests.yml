name: 🔒 Security Regression Tests — Spring Boot

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-scan:
    name: 🔍 Build & Security Scan
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: security123
          MYSQL_DATABASE: securitydb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecurity123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Build with Maven
        run: mvn clean package -DskipTests -B
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/securitydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: security123

      - name: 🧪 Run Tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/securitydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: security123

      - name: 🔍 Security Scan — Start API
        run: |
          java -jar target/*.jar &
          sleep 15
          echo "API démarrée sur localhost:8080"
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/securitydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: security123

      - name: 🔍 Security Scan — Analyze sample code
        id: security_scan
        run: |
          # Attendre que l'API soit prête
          for i in {1..10}; do
            if curl -s http://localhost:8080/api/health > /dev/null; then
              echo "API prête !"
              break
            fi
            echo "Attente de l'API... ($i/10)"
            sleep 3
          done

          # Scanner un fichier de test vulnérable
          cat > /tmp/test_vulnerable.java << 'EOF'
          public class VulnerableApp {
              private String password = "admin123";
              public void getUser(String username) {
                  String query = "SELECT * FROM users WHERE name='" + username + "'";
              }
          }
          EOF

          RESPONSE=$(curl -s -X POST http://localhost:8080/api/analyze \
            -F "file=@/tmp/test_vulnerable.java" \
            -H "Accept: application/json")

          echo "RESPONSE=$RESPONSE"
          GATE=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('gateStatus','UNKNOWN'))")
          echo "gate_status=$GATE" >> $GITHUB_OUTPUT
          echo "Security Gate Status: $GATE"
        continue-on-error: true

      - name: 🚦 Security Gate
        run: |
          STATUS="${{ steps.security_scan.outputs.gate_status }}"
          if [ "$STATUS" = "BLOCKED" ]; then
            echo "=================================================="
            echo "❌ BUILD BLOQUÉ — Vulnérabilités critiques détectées"
            echo "=================================================="
            exit 1
          else
            echo "=================================================="
            echo "✅ SECURITY GATE PASSED — Build autorisé"
            echo "=================================================="
          fi

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spring-boot-jar-${{ github.run_number }}
          path: target/*.jar
          retention-days: 7
