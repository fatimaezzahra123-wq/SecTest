version: '3.8'

services:

  # ── MySQL Database ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sectest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: security123
      MYSQL_DATABASE: securitydb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecurity123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sectest-network

  # ── Spring Boot API ────────────────────────────────────────
  api:
    build: .
    container_name: sectest-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/securitydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: security123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sectest-network
    restart: on-failure

volumes:
  mysql_data:

networks:
  sectest-network:
    driver: bridge
